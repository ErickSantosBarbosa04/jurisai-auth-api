<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JurisAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/loginStyle.css">
</head>
<body>
    <div id="toast">
        <span id="toast-message"></span>
        <div id="toast-timer" class="toast-timer"></div>
    </div>

    <div class="login-container">
    <h2>JurisAI</h2>
    <p class="subtitle">Acesse sua conta para continuar</p>

    <div id="mensagemAviso"></div>
    
    <div id="loginFormDiv"> 
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" required placeholder="exemplo@email.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" required placeholder="Sua senha" autocomplete="current-password">
        </div>

        <button type="button" id="btnEntrar" onclick="realizarLogin()">Entrar</button>

        <div class="extra-links">
            <div class="helper-links">
                <a href="esqueci.html">Esqueci minha senha</a>
            </div>
            
            <div class="register-footer">
                <span>Não tem uma conta?</span> 
                <a href="register.html">Criar conta</a>
            </div>
        </div>
    </div>
</div>

    <script src="../js/loginJs.js"></script>
</body>
</html>
