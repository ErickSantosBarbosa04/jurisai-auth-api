<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login JurisAI</title>
    <link rel="stylesheet" href="../css/loginStyle.css">
</head>
<body>
    <div id="toast">
        <span id="toast-message"></span>
        <div id="toast-timer" class="toast-timer"></div>
    </div>

    <div class="login-container">
        <h2>JurisAI Auth</h2>
        
        <form id="loginForm"> 
            <div class="form-group">
                <label>E-Mail</label>
                <input type="email" id="email" required placeholder="Exemplo@Gmail.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" required placeholder="**********">
            </div>
            <button type="submit">Entrar</button>
            <div class="register-footer" style="margin-top: 25px; font-size: 14px; text-align: left;">
            <span style="color: #1b1b1b;">Não tem uma conta?</span> 
            <a href="register.html" style="color: #0067b8; text-decoration: none;">Crie uma agora!</a>
            </div>
            
            <div class="helper-links">
            <a href="esqueci.html" style="text-decoration: none; color: #0067b8; font-size: 14px;">Esqueci minha senha</a>
        </div>
        </form>

        <p id="message"></p>
    </div>

    <script src="../js/loginJs.js"></script>
</body>
</html>
