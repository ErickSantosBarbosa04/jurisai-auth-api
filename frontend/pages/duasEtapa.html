<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Segurança de Duas Etapas - JurisAI</title>
    <link rel="stylesheet" href="../css/recuperar-2fa.css">
</head>
<body>
    <div class="auth-card">
        <h2>Verificação de Segurança</h2>
        <p id="userEmail" style="font-weight: bold; color: #666;"></p>

        <div id="mensagemStatus" style="display:none; color: #d9534f; background: #f9f2f2; padding: 10px; margin: 10px 0; border-radius: 4px; font-size: 13px;"></div>

        <div class="auth-instruction">
            <p>Digite o código de 6 dígitos do seu <strong>Authenticator</strong> para continuar.</p>
        </div>

        <div class="totp-container">
            <input type="text" id="totpCode" maxlength="6" placeholder="000000" class="totp-input" autofocus>
        </div>

        <div class="button-group">
            <button onclick="confirmarLogin2FA()" class="btn-primary">Verificar e Entrar</button>
        </div>
    </div>

    <script src="../js/duasEtapa.js"></script>
</body>
</html>
