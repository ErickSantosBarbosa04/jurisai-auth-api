<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta | JurisAI</title>
    <link rel="stylesheet" href="../css/registrar.css">
</head>
<body>
    <div class="auth-card">
        <a href="login.html" class="back-link-container">
            <img src="../assets/botao-voltar.png" alt="Voltar para o Login" class="back-link-img">
        </a>

        <h3>Criar conta</h3>

        <div id="mensagemStatus" style="display: none;"></div>
        
        <form onsubmit="return realizarRegistro(event)">
            <div class="input-group">
                <input type="text" id="fullName" maxlength="120" placeholder="Nome completo" class="auth-input" required>
            </div>

            <div class="input-group">
                <input type="email" id="regEmail" maxlength="80" placeholder="E-mail" class="auth-input" required>
            </div>

            <div class="input-group">
                <input type="text" id="university" maxlength="160" placeholder="Faculdade" class="auth-input" required>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <select id="semester" class="auth-input" required>
                        <option value="">Semestre</option>
                    </select>
                </div>

                <div class="input-group">
                    <select id="legalSpecialty" class="auth-input" required>
                        <option value="">Area de interesse</option>
                        <option>Direito Civil</option>
                        <option>Direito do Trabalho</option>
                        <option>Direito Penal</option>
                        <option>Direito Empresarial</option>
                        <option>Direito Tributario</option>
                        <option>Direito Constitucional</option>
                        <option>Direito Administrativo</option>
                        <option>Direito do Consumidor</option>
                        <option>Direito de Familia</option>
                        <option>Direito Previdenciario</option>
                        <option>Direito Ambiental</option>
                        <option>Direito Digital</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <input type="password" id="regPassword" maxlength="25" placeholder="Senha" class="auth-input" required>
                <div class="strength-meter">
                    <div id="strengthBar" class="bar"></div>
                </div>
                <small id="strengthText">Forca da senha: 0/5</small>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" maxlength="25" placeholder="Confirme a senha" class="auth-input" required>
            </div>

            <label class="consent-line">
                <input type="checkbox" id="lgpdConsent" required>
                <span>Aceito o uso dos meus dados para autenticacao e seguranca da conta.</span>
            </label>

            <div class="button-group">
                <button type="submit" class="btn-primary">Criar conta</button>
            </div>
        </form>
    </div>

    <script src="../js/registrar.js"></script>
</body>
</html>
