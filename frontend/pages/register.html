<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta | JurisAI</title>
    <link rel="stylesheet" href="../css/registrar.css">
</head>
<body>
    <div class="auth-card">
        <a href="login.html" class="back-link-container">
            <img src="../assets/botao-voltar.png" alt="Voltar para o Login" class="back-link-img">
        </a>

        <h3>Criar conta</h3>

        <div id="mensagemStatus" style="display: none;"></div>
        
        <form onsubmit="return realizarRegistro(event)">
            <div class="input-group">
                <input type="text" id="regFullName" placeholder="Nome Completo" class="auth-input" required>
            </div>

            <div class="input-group">
                <input type="email" id="regEmail" maxlength="35" placeholder="E-mail" class="auth-input" required>
            </div>

            <div class="input-group">
                <input type="text" id="regRGM" placeholder="RGM (Matrícula)" class="auth-input" required>
            </div>

            <div class="input-group">
                <input type="text" id="regUniversity" placeholder="Instituição de Ensino" class="auth-input" required>
            </div>

            <div class="input-group">
                <input type="number" id="regSemester" placeholder="Semestre Atual" class="auth-input" min="1" max="12" required>
            </div>

            <div class="input-group">
                <input type="password" id="regPassword" maxlength="25" placeholder="Senha" class="auth-input" required>
                <div class="strength-meter">
                    <div id="strengthBar" class="bar"></div>
                </div>
                <small id="strengthText">Força da senha: 0/5</small>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" maxlength="25" placeholder="Confirme a senha" class="auth-input" required>
            </div>

            <div class="input-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                <input type="checkbox" id="lgpdConsent" required>
                <label for="lgpdConsent" style="font-size: 12px; color: #666;">
                    Consinto com o uso dos meus dados para fins acadêmicos e segurança.
                </label>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">Criar conta</button>
            </div>
        </form>
        
    </div>

    <script src="../js/registrar.js"></script>
</body>
</html>
