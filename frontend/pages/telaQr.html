<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar 2FA | JurisAI</title>
    <link rel="stylesheet" href="../css/recuperar-2fa.css">
</head>
<body>
    <div class="auth-card">
        <h2>Ativar duas etapas</h2>

        <div id="mensagemStatus" style="display:none; color: #d9534f; background: #f9f2f2; padding: 10px; margin: 10px 0; border-radius: 4px; font-size: 13px;"></div>

        <div class="auth-instruction">
            <p>Leia o QR Code no Authenticator e confirme o codigo gerado.</p>
        </div>

        <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;">
            <p>Gerando QR Code...</p>
        </div>

        <div class="totp-container">
            <input type="text" id="totpCode" maxlength="6" placeholder="000000" class="totp-input" autofocus>
        </div>

        <div class="button-group">
            <button onclick="ativar2FA()" class="btn-primary">Ativar e entrar</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="../js/ativar-2fa.js"></script>
</body>
</html>
