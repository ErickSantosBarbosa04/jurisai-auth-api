<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verificação de Identidade - JurisAI</title>
    <link rel="stylesheet" href="../css/recuperar-2fa.css">
</head>
<body>
    <div class="auth-card">
        
        <div class="user-info">
            <a href="esqueci.html" class="back-link">←</a>
            <span id="displayEmail" style="font-weight: bold;">carregando...</span>
        </div>

        <h2>Aprovar solicitação</h2>

        <div id="mensagemStatus" style="display:none; color: #d9534f; background: #f9f2f2; padding: 10px; margin: 10px 0; border-radius: 4px; font-size: 13px;"></div>

        <div class="auth-instruction">
            <p>Abra o aplicativo <strong>Authenticator</strong> e insira o código de 6 dígitos.</p>
        </div>

        <div class="totp-container">
            <input type="text" id="totpCode" maxlength="6" placeholder="000000" class="totp-input">
        </div>

        <div class="button-group">
            <button onclick="validarEVoltar()" class="btn-primary">Verificar e Entrar</button>
        </div>
    </div>

    <script src="../js/2faRecupera.js"></script>

</body>
</html>
